<div class="card">
    <div class="card-header">
        <div class="card-label">
            <span class="dot"></span>
            Endereço
        </div>
        <span class="cep-badge">CEP {{ dados.cep }}</span>
    </div>

    <p class="address-main">{{ dados.logradouroCompleto }}</p>
    <p class="address-sub">{{ dados.bairro }} · {{ dados.cidade }} · {{ dados.uf }} · DDD {{ dados.ddd }}</p>

    <div class="badges">
        <span class="badge accent">{{ dados.cidade }} · {{ dados.uf }}</span>
        <span class="badge teal">DDD {{ dados.ddd }}</span>
        <span class="badge">{{ dados.bairro }}</span>
    </div>

    <div class="divider"></div>

    <div class="coords">
        <span class="coords-label">lat</span>
        <span class="coords-value">{{ dados.latitude }}</span>
        <span class="coords-sep">/</span>
        <span class="coords-label">lng</span>
        <span class="coords-value">{{ dados.longitude }}</span>
    </div>
</div>
