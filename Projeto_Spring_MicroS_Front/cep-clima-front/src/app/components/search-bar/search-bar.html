<div class="search-bar">
    <input class="search-input" type="text" placeholder="Digite o CEP (ex: 01035100)" [(ngModel)]="cep"
        (keyup.enter)="buscar()" />
    <button class="search-btn" (click)="buscar()" [disabled]="loading">
        {{ loading ? 'Buscando...' : 'Buscar →' }}
    </button>
</div>
